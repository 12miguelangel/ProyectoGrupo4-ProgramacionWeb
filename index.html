<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Alumnos</title>
    <style>
        body {
            background: linear-gradient(to bottom, lightblue,black);
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>Registro de Alumnos - Grupo 4</h1>
    <form id="formAlumno">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="apellido" placeholder="Apellido">
        <input type="text" id="celular" placeholder="Número Celular">
        <button type="button">Registrar</button>
    </form>
    <ul id="lista"></ul>
</body>
</html>
